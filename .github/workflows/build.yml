name: build
on:
  push:
    branches: main
    paths-ignore:
      - '**/*.md'
      - '**/*.js'
jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v6

    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v3
      
    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
        key: 7bb810743cbd9abd428be024c838783a58d5d4c1

    - name: Set up vcpkg
      working-directory: C:\vcpkg
      run: |
        git pull && bootstrap-vcpkg && vcpkg integrate install
        vcpkg install curl[http2] cpr fmt miniz nlohmann-json wil wtl --triplet x64-windows-static

    - name: Build
      run: msbuild workspace\foo_spider_monkey_panel.slnx /p:PlatformToolset=v143
      
    - name: Upload pdb
      uses: actions/upload-artifact@v7
      with:
        name: debug_symbols
        path: dist/foo_spider_monkey_panel.pdb

    - name: Delete pdb
      run: del dist/foo_spider_monkey_panel.pdb

    - name: Upload dist folder
      uses: actions/upload-artifact@v7
      with:
        name: foo_spider_monkey_panel-${{ github.sha }}
        path: dist
